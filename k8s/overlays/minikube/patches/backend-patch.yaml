apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ghost-backend
spec:
  template:
    spec:
      containers:
        - name: backend
          # Use local docker image (built into minikube's docker daemon)
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
