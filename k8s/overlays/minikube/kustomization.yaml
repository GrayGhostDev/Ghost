apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/backend-patch.yaml
  - path: patches/gcp-auth-patch.yaml

# Dev secrets — literal values for local minikube only.
# Production uses External Secrets Operator or sealed-secrets.
secretGenerator:
  - name: backend-secrets
    namespace: ghost-backend
    literals:
      - DB_PASSWORD=ghost_password
      - REDIS_PASSWORD=changeme
      - JWT_SECRET=minikube-dev-jwt-secret-not-for-production
      - API_KEY=minikube-dev-api-key
