apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ghost-backend
  labels:
    app: redis
    app.kubernetes.io/name: ghost-backend
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: redis
