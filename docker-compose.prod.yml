services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ghost-backend:production
    container_name: ghost-be-api
    ports:
      # Bind to localhost only — Traefik (Level 2) handles external routing
      - "127.0.0.1:8801:8801"
    environment:
      # Application settings
      - ENVIRONMENT=production
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8801
      - WORKERS=4
      - LOG_LEVEL=warning
      - LOG_JSON=true

      # Database configuration
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ghost
      - DB_USER=${DB_USER:-ghost_user}
      - DB_PASSWORD=${DB_PASSWORD}  # Must be provided
      
      # Redis configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      
      # Security keys (MUST be provided via .env file)
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      
      # OpenTelemetry (Level 2 Jaeger via ggdc-shared-net)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=ghost-backend
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=ggdc,deployment.environment=production

      # External services
      - ANTHROPIC_ADMIN_API_KEY=${ANTHROPIC_ADMIN_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_PAT=${GITHUB_PAT}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Only mount data directories, not code
      - ghost_logs:/app/logs
      - ghost_uploads:/app/uploads
    networks:
      - ghost-backend-net
      - ggdc-shared-net
    labels:
      traefik.enable: "true"
      traefik.http.routers.ghost-backend.rule: "Host(`api.ghost.local`)"
      traefik.http.routers.ghost-backend.entrypoints: "websecure"
      traefik.http.services.ghost-backend.loadbalancer.server.port: "8801"
      traefik.docker.network: "ggdc-shared-net"
      com.ggdc.project: "GGDC-System"
      com.ggdc.service: "ghost-be-api"
      com.ggdc.level: "2"
      com.ggdc.scrape: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8801/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
  postgres:
    image: postgres:16-alpine
    container_name: ghost-be-db
    environment:
      - POSTGRES_DB=ghost
      - POSTGRES_USER=${DB_USER:-ghost_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}  # Must be provided
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      # Performance tuning
      - POSTGRES_MAX_CONNECTIONS=100
      - POSTGRES_SHARED_BUFFERS=256MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=1GB
      - POSTGRES_MAINTENANCE_WORK_MEM=64MB
      - POSTGRES_CHECKPOINT_COMPLETION_TARGET=0.9
      - POSTGRES_WAL_BUFFERS=16MB
      - POSTGRES_DEFAULT_STATISTICS_TARGET=100
      - POSTGRES_RANDOM_PAGE_COST=1.1
      - POSTGRES_EFFECTIVE_IO_CONCURRENCY=200
    # No ports exposed in production - internal only
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/backup
    networks:
      - ghost-backend-net
    labels:
      com.ggdc.project: "GGDC-System"
      com.ggdc.service: "ghost-be-db"
      com.ggdc.level: "2"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ghost_user} -d ghost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  redis:
    image: redis:7-alpine
    container_name: ghost-be-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --tcp-keepalive 60
      --timeout 0
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
      --rdbcompression yes
      --rdbchecksum yes
      --requirepass ${REDIS_PASSWORD:-ghost_redis_2024}
    # No ports exposed in production - internal only
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - redis_backup:/backup
    networks:
      - ghost-backend-net
    labels:
      com.ggdc.project: "GGDC-System"
      com.ggdc.service: "ghost-be-redis"
      com.ggdc.level: "2"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-ghost_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # NOTE: Nginx reverse proxy removed — Level 2 Traefik handles ingress routing.
  # If standalone deployment without Level 2 is needed, uncomment below.
  # nginx:
  #   image: nginx:alpine
  #   container_name: ghost-be-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./config/nginx-example.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - ghost-backend-net
  #   restart: always

networks:
  ghost-backend-net:
    name: ghost-backend-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  ggdc-shared-net:
    external: true
    name: ggdc-shared-net

volumes:
  # Production volumes with backup support
  postgres_data:
    name: ghost-be-postgres-data
    driver: local
  postgres_backup:
    name: ghost-be-postgres-backup
    driver: local
  redis_data:
    name: ghost-be-redis-data
    driver: local
  redis_backup:
    name: ghost-be-redis-backup
    driver: local
  ghost_logs:
    name: ghost-be-logs
    driver: local
  ghost_uploads:
    name: ghost-be-uploads
    driver: local