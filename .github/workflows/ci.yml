name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ghost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ghost_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ghost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Lint with flake8
      run: |
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Type check with mypy
      run: |
        mypy src/ghost/ --ignore-missing-imports --no-strict-optional

    - name: Test with pytest
      env:
        DB_HOST: localhost
        DB_PORT: "5432"
        DB_NAME: ghost
        DB_USER: postgres
        DB_PASSWORD: ghost_password
        REDIS_HOST: localhost
        REDIS_PORT: "6379"
        ENVIRONMENT: testing
      run: |
        pytest tests/ --cov=src/ghost --cov-report=xml --cov-fail-under=50

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Security scanning handled by security.yml (bandit + safety + semgrep + weekly cron)

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image (dev)
      run: docker build -t ghost-backend:test .

    - name: Build Docker image (prod)
      run: docker build -f Dockerfile.prod -t ghost-backend:test-prod .

    - name: Verify container starts with real app
      run: |
        # Start postgres and redis for the container to connect to
        docker network create ghost-ci-net

        docker run -d --name ci-postgres --network ghost-ci-net \
          -e POSTGRES_DB=ghost \
          -e POSTGRES_USER=postgres \
          -e POSTGRES_PASSWORD=ghost_password \
          postgres:16-alpine

        docker run -d --name ci-redis --network ghost-ci-net \
          redis:7-alpine

        # Wait for services
        sleep 5

        # Start the real app (not a throwaway FastAPI) with fast-fail retries
        docker run -d --name ghost-test --network ghost-ci-net \
          -e ENVIRONMENT=testing \
          -e SKIP_MIGRATIONS=true \
          -e DB_HOST=ci-postgres \
          -e DB_PORT=5432 \
          -e DB_NAME=ghost \
          -e DB_USER=postgres \
          -e DB_PASSWORD=ghost_password \
          -e REDIS_HOST=ci-redis \
          -e REDIS_PORT=6379 \
          -e MAX_DB_RETRIES=3 \
          -e MAX_REDIS_RETRIES=3 \
          -p 8801:8801 \
          ghost-backend:test

        # Wait for startup and check health
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8801/health >/dev/null 2>&1; then
            echo "Health check passed on attempt $i"
            curl -sf http://localhost:8801/health | python3 -m json.tool
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "Health check failed after 30 attempts"
            docker logs ghost-test
            exit 1
          fi
          sleep 2
        done

        # Cleanup
        docker stop ghost-test ci-postgres ci-redis || true
        docker rm ghost-test ci-postgres ci-redis || true
        docker network rm ghost-ci-net || true

  compose-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Start compose stack
      run: |
        docker compose -f docker-compose.ci.yml up --build --wait --wait-timeout 120

    - name: Health check
      run: |
        curl -sf --retry 5 --retry-delay 5 --retry-all-errors http://localhost:8801/health \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print('Health OK:', d); assert d.get('success') or d.get('status'), 'Health check failed'"

    - name: Show logs on failure
      if: failure()
      run: docker compose -f docker-compose.ci.yml logs

    - name: Cleanup
      if: always()
      run: docker compose -f docker-compose.ci.yml down -v
