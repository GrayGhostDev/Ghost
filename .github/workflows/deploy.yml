name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run pre-deployment tests
      run: |
        pip install -r requirements-dev.txt
        python -m pytest tests/ -m "not slow" -q

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.prod
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    # Ghost Backend can be deployed two ways:
    # 1. As a standalone service (Cloud Run) — what this workflow does
    # 2. As a pip-installable library — published via PyPI (separate workflow)
    #
    # Required secrets:
    #   GCP_PROJECT_ID          — GCP project for Cloud Run
    #   GCP_SA_KEY              — Service account JSON key (or use Workload Identity below)
    #   GCP_REGION              — e.g. us-east1
    #   DEPLOY_URL              — Base URL of deployed service for smoke tests
    #
    # For Workload Identity Federation (preferred over SA key):
    #   GCP_WORKLOAD_IDENTITY_PROVIDER — projects/<num>/locations/global/workloadIdentityPools/...
    #   GCP_SERVICE_ACCOUNT            — deploy@<project>.iam.gserviceaccount.com

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy to staging
      if: ${{ inputs.environment == 'staging' }}
      id: deploy-staging
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ghost-backend-staging
        region: ${{ secrets.GCP_REGION || 'us-east1' }}
        image: ${{ needs.build-and-push.outputs.image_tag }}
        flags: '--port=8801 --memory=512Mi --cpu=1 --max-instances=3 --allow-unauthenticated'

    - name: Deploy to production
      if: ${{ inputs.environment == 'production' || github.event_name == 'release' }}
      id: deploy-production
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ghost-backend
        region: ${{ secrets.GCP_REGION || 'us-east1' }}
        image: ${{ needs.build-and-push.outputs.image_tag }}
        flags: '--port=8801 --memory=1Gi --cpu=2 --max-instances=10 --no-allow-unauthenticated'

    - name: Post-deploy smoke test
      run: |
        DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
        if [ -z "$DEPLOY_URL" ]; then
          # Fall back to Cloud Run URL from deploy step
          DEPLOY_URL="${{ steps.deploy-staging.outputs.url || steps.deploy-production.outputs.url }}"
        fi

        if [ -z "$DEPLOY_URL" ]; then
          echo "::warning::No DEPLOY_URL available — skipping smoke test"
          exit 0
        fi

        echo "Smoke testing ${DEPLOY_URL}/health ..."
        curl -sf --retry 5 --retry-delay 10 --retry-all-errors "${DEPLOY_URL}/health" \
          | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['success'], 'Health check failed'; print('Health OK:', d['data']['api'])"

    - name: Notify deployment status
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const status = '${{ job.status }}';
          const environment = '${{ inputs.environment || 'production' }}';

          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: status === 'success' ? 'success' : 'failure',
            description: `Deployment to ${environment} ${status}`,
            context: `deploy/${environment}`
          });
