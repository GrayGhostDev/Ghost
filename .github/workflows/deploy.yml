name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run pre-deployment tests
      run: |
        pip install -r requirements-dev.txt
        python -m pytest tests/ -m "not slow" -q

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.prod
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy to staging
      if: ${{ inputs.environment == 'staging' || github.event_name == 'workflow_dispatch' }}
      run: |
        echo "Deploying image ${{ needs.build-and-push.outputs.image_tag }} to staging"
        # TODO: Add actual staging deployment commands (e.g. SSH, kubectl, render deploy)
        echo "Staging deployment completed"

    - name: Deploy to production
      if: ${{ inputs.environment == 'production' || github.event_name == 'release' }}
      run: |
        echo "Deploying image ${{ needs.build-and-push.outputs.image_tag }} to production"
        # TODO: Add actual production deployment commands
        echo "Production deployment completed"

    - name: Post-deploy smoke test
      run: |
        # Wait for service to start, then verify health endpoint
        echo "Running post-deploy smoke test..."
        # TODO: Replace with actual deployed URL once deployment target is configured
        # Example: curl -sf --retry 5 --retry-delay 10 https://api.ghost.local/health
        echo "Smoke test placeholder — configure DEPLOY_URL secret for real checks"

    - name: Notify deployment status
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const status = '${{ job.status }}';
          const environment = '${{ inputs.environment || 'production' }}';

          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: status === 'success' ? 'success' : 'failure',
            description: `Deployment to ${environment} ${status}`,
            context: `deploy/${environment}`
          });
