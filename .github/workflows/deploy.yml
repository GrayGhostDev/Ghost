name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

concurrency:
  group: deploy-ghost-backend
  cancel-in-progress: false

env:
  REGISTRY: us-east1-docker.pkg.dev/sylvan-flight-476922-m7/ggdc-docker
  IMAGE_NAME: ghost-backend
  GCP_REGION: us-east1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.image-ref.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run pre-deployment tests
      run: |
        pip install -r requirements-dev.txt
        python -m pytest tests/ -m "not slow" -q

    - name: Preflight — check required secrets
      id: preflight
      run: |
        if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] || [ -z "${{ secrets.GCP_SERVICE_ACCOUNT }}" ]; then
          echo "::warning::GCP WIF secrets not configured — skipping deploy"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Authenticate to Google Cloud (Workload Identity Federation)
      if: steps.preflight.outputs.skip != 'true'
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      if: steps.preflight.outputs.skip != 'true'
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      if: steps.preflight.outputs.skip != 'true'
      run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

    - name: Build and push Docker image
      if: steps.preflight.outputs.skip != 'true'
      run: |
        IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        docker build -f Dockerfile.prod -t "$IMAGE_TAG" .
        docker tag "$IMAGE_TAG" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        docker push "$IMAGE_TAG"
        docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

    - name: Set image ref output
      if: steps.preflight.outputs.skip != 'true'
      id: image-ref
      run: echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    if: needs.build-and-push.outputs.image_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment || 'production' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Determine service name
      id: svc
      run: |
        if [ "${{ inputs.environment }}" = "staging" ]; then
          echo "name=ghost-backend-staging" >> "$GITHUB_OUTPUT"
        else
          echo "name=ghost-backend" >> "$GITHUB_OUTPUT"
        fi

    # Canary deploy: deploy with --no-traffic, health check, then promote
    - name: Deploy canary (no traffic)
      id: canary
      run: |
        gcloud run deploy ${{ steps.svc.outputs.name }} \
          --image=${{ needs.build-and-push.outputs.image_tag }} \
          --region=${{ env.GCP_REGION }} \
          --port=8801 \
          --memory=512Mi \
          --cpu=1 \
          --max-instances=${{ inputs.environment == 'staging' && '3' || '10' }} \
          --execution-environment=gen2 \
          --no-traffic \
          --tag=canary \
          --quiet

        # Get the canary revision URL
        CANARY_URL=$(gcloud run services describe ${{ steps.svc.outputs.name }} \
          --region=${{ env.GCP_REGION }} \
          --format='value(status.traffic[tag=canary].url)')
        echo "url=$CANARY_URL" >> "$GITHUB_OUTPUT"

    - name: Health check canary
      run: |
        CANARY_URL="${{ steps.canary.outputs.url }}"
        echo "Health checking canary at ${CANARY_URL}/health ..."
        curl -sf --retry 5 --retry-delay 10 --retry-all-errors "${CANARY_URL}/health" \
          | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success') or d.get('status'), 'Health check failed'; print('Canary healthy:', d)"

    - name: Promote canary to 100% traffic
      run: |
        gcloud run services update-traffic ${{ steps.svc.outputs.name }} \
          --region=${{ env.GCP_REGION }} \
          --to-latest \
          --quiet
        echo "Canary promoted to 100% traffic"

    - name: Post-deploy smoke test
      run: |
        SERVICE_URL=$(gcloud run services describe ${{ steps.svc.outputs.name }} \
          --region=${{ env.GCP_REGION }} \
          --format='value(status.url)')

        echo "Smoke testing ${SERVICE_URL}/health ..."
        curl -sf --retry 5 --retry-delay 10 --retry-all-errors "${SERVICE_URL}/health" \
          | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success') or d.get('status'), 'Smoke test failed'; print('Production healthy:', d)"

    - name: Notify deployment status
      uses: actions/github-script@v8
      if: always()
      with:
        script: |
          const status = '${{ job.status }}';
          const environment = '${{ inputs.environment || 'production' }}';

          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: status === 'success' ? 'success' : 'failure',
            description: `Deployment to ${environment} ${status}`,
            context: `deploy/${environment}`
          });
